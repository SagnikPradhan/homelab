- name: Ensure Frigate config directory exists
  become: true
  become_user: root
  ansible.builtin.file:
    path: "{{ frigate_config_file | dirname }}"
    state: directory
    recurse: true
    mode: "775"
    owner: "{{ ansible_user_id }}"
    group: docker

- name: Download YOLOv9 TFLite model
  become: true
  become_user: root
  ansible.builtin.get_url:
    url: https://github.com/dbro/frigate-detector-edgetpu-yolo9/releases/download/v1.0/yolov9-s-relu6-best_320_int8_edgetpu.tflite
    dest: "{{ frigate_config_file | dirname }}/yolov9-s-relu6-best_320_int8_edgetpu.tflite"
    mode: "664"
    owner: "{{ ansible_user_id }}"
    group: docker

- name: Download YOLOv9 COCO17 label map
  become: true
  become_user: root
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/dbro/frigate-detector-edgetpu-yolo9/refs/heads/main/labels-coco17.txt
    dest: "{{ frigate_config_file | dirname }}/labels-coco17.txt"
    mode: "664"
    owner: "{{ ansible_user_id }}"
    group: docker

- name: Copy Frigate config file
  become: true
  become_user: root
  register: copy_frigate_config
  ansible.builtin.copy:
    src: frigate.yaml
    dest: "{{ frigate_config_file }}"
    mode: "775"
    owner: "{{ ansible_user_id }}"
    group: docker

- name: Ensure Frigate project directory exists
  become: true
  become_user: root
  ansible.builtin.file:
    path: "{{ frigate_project_directory }}"
    state: directory
    recurse: true
    mode: "775"
    owner: "{{ ansible_user_id }}"
    group: docker

- name: Copy Frigate docker compose file
  become: true
  become_user: root
  ansible.builtin.template:
    backup: true
    src: docker-compose.yml
    dest: "{{ frigate_project_directory }}/docker-compose.yml"
    mode: "775"
    owner: "{{ ansible_user_id }}"
    group: docker

- name: Deploy Frigate container
  community.docker.docker_compose_v2:
    project_name: "frigate"
    project_src: "{{ frigate_project_directory }}"
    state: restarted
    remove_orphans: true
    wait: true
