version: 0.15-1

mqtt:
  enabled: true
  host: mosquitto
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"

tls:
  enabled: false
auth:
  enabled: false
proxy:
  default_role: admin

# Logging settings
logger:
  default: info
  logs:
    frigate.record.maintainer: debug

# Hardware acceleration through AMD GPU
ffmpeg:
  hwaccel_args: preset-vaapi
  apple_compatibility: true

# Object detection through edge TPU
detectors:
  coral:
    type: edgetpu
    device: pci

model:
  model_type: yolo-generic
  width: 320
  height: 320
  path: /config/yolov9-s-relu6-best_320_int8_edgetpu.tflite
  labelmap_path: /config/labels-coco17.txt

objects:
  track:
    - person
    - cat
    - dog
    - bird

# Semantic Search
semantic_search:
  enabled: false
  reindex: false

# Gen AI
genai:
  enabled: false

review:
  alerts:
    labels:
      - person
      - cat
      - dog

# go2rtc to reduce connections to the camera
go2rtc:
  streams:
    door_camera:
      - "{FRIGATE_DOOR_CAMERA_RTSP_STREAM1}"
      - "ffmpeg:door_camera#video=copy"
    door_camera_sub:
      - "{FRIGATE_DOOR_CAMERA_RTSP_STREAM2}"
      - "ffmpeg:door_camera_sub#video=copy"

# Camera configuration
cameras:
  door_camera:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/door_camera
          input_args: preset-rtsp-restream
          roles:
            - record
        - path: rtsp://127.0.0.1:8554/door_camera_sub
          input_args: preset-rtsp-restream
          roles:
            - detect

    detect:
      enabled: true
      fps: 30

    record:
      enabled: true
      sync_recordings: true
      retain:
        days: 10
        mode: all
      alerts:
        retain:
          days: 30
          mode: motion
      detections:
        retain:
          days: 30
          mode: motion

    motion:
      mask:
        - 0.301,0.326,0.306,0.309,0.341,0.304,0.365,0.319,0.373,0.356,0.361,0.393,0.369,0.44,0.341,0.464,0.322,0.46
        - 0.819,0,0.774,0.059,0.717,0.121,0.718,0.222,0.7,0.268,0.651,0.255,0.598,0.22,0.57,0.252,0.506,0.269,0.47,0.303,0.445,0.402,0.513,0.524,0.488,0.624,0.637,0.723,0.768,0.822,0.808,0.955,0.893,1,0.993,1,0.993,0
        - 0,0.216,0.315,0,0,0
      threshold: 50
      contour_area: 40
      improve_contrast: false
